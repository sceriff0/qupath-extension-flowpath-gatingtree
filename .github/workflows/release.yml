name: Build and Release

# Two ways in:
#   1. workflow_dispatch — you type the version; the job tests main and ONLY
#      creates the tag + release if tests pass (no dangling tags on failure).
#   2. push of a v* tag — the original manual-tag path, still supported.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, e.g. 1.9.1 (must match build.gradle.kts). Tag is created only if tests pass.'
        required: true
        type: string

permissions:
  contents: write
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # JavaFX needs a display + GTK/GL libs even for unit tests that construct
      # controls. xvfb provides a virtual framebuffer so the real toolkit starts
      # headlessly (preferred over Monocle, which has no JavaFX 25-matched build).
      - name: Install headless display deps
        run: sudo apt-get update && sudo apt-get install -y xvfb libgl1 libgtk-3-0

      # Resolve the release tag from either the dispatch input or the pushed tag,
      # normalizing so "1.9.1" and "v1.9.1" both yield tag "v1.9.1".
      - name: Resolve release tag
        id: rel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ inputs.version }}"
          else
            RAW="${GITHUB_REF_NAME}"
          fi
          VER="${RAW#v}"
          echo "tag=v${VER}" >> "$GITHUB_OUTPUT"
          echo "ver=${VER}"  >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: v${VER}"

      # Guard 0: the catalog secret MUST exist, or the entire release is refused
      # BEFORE anything is built, tagged, or published. A missing secret used to
      # surface only at the final "Update catalog" step — after the release was
      # already out — so the catalog could silently fall behind. Fail fast here.
      #   workflow_dispatch: the tag is created later in this job, so failing now
      #     means no tag is ever created.
      #   tag push: the tag already exists (it triggered this run); delete it so a
      #     missing secret leaves no dangling tag on an unreleased commit.
      # (secrets cannot be read in step `if:`, so the check lives in the script.)
      - name: Require CATALOG_PAT secret
        env:
          CATALOG_PAT: ${{ secrets.CATALOG_PAT }}
          TAG: ${{ steps.rel.outputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Refuse if the secret is missing/empty.
          if [ -z "$CATALOG_PAT" ]; then
            echo "::error::CATALOG_PAT secret is missing or empty. Refusing to tag or release ${TAG} so the catalog can never fall out of sync. Add it in Settings → Secrets and variables → Actions, then re-run." >&2
            if [ "$EVENT_NAME" = "push" ]; then
              echo "Tag ${TAG} was pushed without a configured catalog secret — deleting it so the tag does not take effect." >&2
              git push --delete origin "$TAG" || echo "::warning::Could not delete tag ${TAG}; please remove it manually."
            fi
            exit 1
          fi
          # The secret being non-empty is NOT enough: a read-only PAT clones fine
          # but fails at the final push with 403, after the release is already out
          # (this exact failure left the catalog one release behind on every repo).
          # Probe actual write capability via the API before building anything.
          RESP=$(curl -sSL -H "Authorization: Bearer $CATALOG_PAT" -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/sceriff0/flowpath-catalog)
          PUSH=$(printf '%s' "$RESP" | jq -r '.permissions.push // false' 2>/dev/null || echo false)
          if [ "$PUSH" != "true" ]; then
            echo "::error::CATALOG_PAT cannot WRITE to sceriff0/flowpath-catalog (permissions.push=${PUSH}). Grant 'Contents: Read and write' on that repo (fine-grained PAT) or 'repo' scope (classic), then re-run." >&2
            if [ "$EVENT_NAME" = "push" ]; then
              echo "Deleting tag ${TAG} so a read-only secret leaves no dangling tag on an unreleased commit." >&2
              git push --delete origin "$TAG" || echo "::warning::Could not delete tag ${TAG}; please remove it manually."
            fi
            exit 1
          fi
          echo "CATALOG_PAT is configured and can write to the catalog — release may proceed."

      # Guard 1: the version being released must match build.gradle.kts, so the
      # built JAR, the tag, and the catalog entry can never disagree.
      - name: Verify version matches build.gradle.kts
        run: |
          FILE_VER=$(grep -E '^[[:space:]]*version = "' build.gradle.kts | head -1 | sed -E 's/.*version = "([^"]+)".*/\1/')
          if [ "$FILE_VER" != "${{ steps.rel.outputs.ver }}" ]; then
            echo "::error::Release version ${{ steps.rel.outputs.ver }} != build.gradle.kts version ${FILE_VER}. Bump build.gradle.kts and push to main first." >&2
            exit 1
          fi
          echo "Version match: ${FILE_VER}"

      # Guard 2 (dispatch only): refuse to clobber an existing tag.
      - name: Ensure tag does not already exist
        if: github.event_name == 'workflow_dispatch'
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.rel.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.rel.outputs.tag }} already exists. Bump the version." >&2
            exit 1
          fi

      # The gate: if tests fail, the job stops here and no tag is ever created.
      - name: Build and test
        env:
          FLOWPATH_FX_REQUIRED: "true"   # fail loudly if the xvfb display breaks
        run: xvfb-run --auto-servernum ./gradlew build

      - name: Upload test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: build/test-results/test/*.xml
          reporter: java-junit

      # Tests passed (the step above would have failed the job otherwise). Create
      # the tag now. Pushed with GITHUB_TOKEN, so it will NOT re-trigger this
      # workflow (recursion prevention) — exactly what we want.
      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.rel.outputs.tag }}" -m "FlowPath ${{ steps.rel.outputs.tag }}"
          git push origin "${{ steps.rel.outputs.tag }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          files: build/libs/*.jar
          generate_release_notes: true

      - name: Update catalog
        env:
          CATALOG_PAT: ${{ secrets.CATALOG_PAT }}
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          if [ -z "$CATALOG_PAT" ]; then
            echo "::error::CATALOG_PAT secret is missing or empty — catalog was NOT updated for ${TAG}. Add/rotate it in repo Settings → Secrets and variables → Actions." >&2
            exit 1
          fi
          JAR_NAME=$(find build/libs -name '*.jar' ! -name '*-all.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' -printf '%f' -quit)
          # GitHub normalizes spaces to dots in release asset filenames
          JAR_NAME="${JAR_NAME// /.}"

          git clone https://x-access-token:${CATALOG_PAT}@github.com/sceriff0/flowpath-catalog.git /tmp/catalog
          cd /tmp/catalog

          EXTENSION_NAME="FlowPath - GatingTree"
          DOWNLOAD_URL="https://github.com/sceriff0/qupath-extension-flowpath-gatingtree/releases/download/${TAG}/${JAR_NAME}"

          NEW_RELEASE=$(jq -n --arg name "$TAG" --arg url "$DOWNLOAD_URL" \
            '{name: $name, main_url: $url, version_range: {min: "v0.7.0"}}')

          # Idempotent insert: skip if this version is already present (prevents duplicates)
          jq --arg ext "$EXTENSION_NAME" --argjson release "$NEW_RELEASE" \
            '(.extensions[] | select(.name == $ext) | .releases) |= (if any(.[]; .name == $release.name) then . else [$release] + . end)' \
            catalog.json > catalog.tmp && mv catalog.tmp catalog.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          git diff --staged --quiet && { echo "Catalog already contains ${EXTENSION_NAME} ${TAG} — nothing to commit."; exit 0; }
          git commit -m "Add ${EXTENSION_NAME} ${TAG} to catalog"
          git push
